version: '3.8'

services:
  ormonitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ormonitor
    ports:
      - "3000:3000"
    volumes:
      # 持久化数据目录，确保数据不丢失
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
